<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxTitan</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        #chatbox { width: 100%; max-width: 500px; height: 300px; border: 1px solid #ddd; overflow-y: auto; padding: 10px; margin: 20px auto; }
        input, button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>

    <h1>VoxTitan AI Chat</h1>
    <div id="chatbox"></div>
    <input type="text" id="userInput" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">🎤 Voice</button>

    <script>
        function sendMessage() {
            let userInput = document.getElementById("userInput").value;
            document.getElementById("chatbox").innerHTML += "<p><b>You:</b> " + userInput + "</p>";

            fetch("https://vox-titan.onrender.com", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ "user_input": userInput })
            })
            .then(response => response.json())
            .then(data => {
                let aiResponse = data.choices[0].message.content;
                document.getElementById("chatbox").innerHTML += "<p><b>VoxTitan:</b> " + aiResponse + "</p>";
            });
        }

        function startVoice() {
            let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            recognition.start();
            recognition.onresult = function(event) {
                document.getElementById("userInput").value = event.results[0][0].transcript;
            };
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxTitan</title>
</head>
<body>
    <h2>VoxTitan - AI Chatbot</h2>
    <input type="text" id="userMessage" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoiceRecognition()">🎤 Voice</button>
    <p id="response"></p>

    <script>
        function sendMessage() {
            const message = document.getElementById("userMessage").value;
            fetch("https://vox-titan.onrender.com/", {  
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => document.getElementById("response").innerText = data.response)
            .catch(error => console.error("Error:", error));
        }

        function startVoiceRecognition() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.onresult = function(event) {
                document.getElementById("userMessage").value = event.results[0][0].transcript;
                sendMessage();
            };
            recognition.start();
        }
    </script>
</body>
</html>
